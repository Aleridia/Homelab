- name: Setup installation
  hosts: localhost
  vars:
    keycloak_hostname: "keycloak.{{ lookup('env', 'DOMAIN_NAME') }}"
    keycloak_admin_hostname: "{{ lookup('env', 'KEYCLOAK_ADMIN_HOSTNAME') }}"
    keycloak_admin_hostname_frontend: "https://{{ lookup('env', 'KEYCLOAK_ADMIN_HOSTNAME') }}/"
    hostname: "{{ lookup('env', 'DOMAIN_NAME') }}"
    keycloak_admin_user: "{{ lookup('env', 'KEYCLOAK_ADMIN_USERNAME') }}"
    keycloak_admin_password: "{{ lookup('env', 'KEYCLOAK_ADMIN_PASSWORD') }}"
    keycloak_postgres_password: "{{ lookup('env', 'KEYCLOAK_POSTGRES_PASSWORD') }}"
    keycloak_postgres_user: "{{ lookup('env', 'KEYCLOAK_POSTGRES_USER') }}"

  tasks:
    - name: Install Keycloak
      block:
        - name: Create temporary chart directory
          ansible.builtin.tempfile:
            state: directory
            suffix: keycloak-chart
          register: keycloak_chart_dir

        - name: Pull Keycloak chart from OCI
          ansible.builtin.shell: "helm pull oci://registry-1.docker.io/bitnamicharts/keycloak --untar --untardir {{ keycloak_chart_dir.path }}"

        - name: Create temporary Keycloak values file
          ansible.builtin.tempfile:
            state: file
            suffix: keycloak-values.yaml
          register: keycloak_values_file

        - name: Render Keycloak values file
          ansible.builtin.template:
            src: values.yaml
            dest: "{{ keycloak_values_file.path }}"
            mode: "0600"

        - name: Install Keycloak from pulled chart
          kubernetes.core.helm:
            name: "{{ lookup('env', 'NAMESPACE') }}"
            chart_ref: "{{ keycloak_chart_dir.path }}/keycloak"
            release_namespace: "{{ lookup('env', 'NAMESPACE') }}"
            state: present
            create_namespace: true
            values_files:
              - "{{ keycloak_values_file.path }}"

        - name: Nginx forward headers
          kubernetes.core.k8s:
            state: present
            src: configmap.yaml

      always:
        - name: Remove temporary Keycloak values file
          ansible.builtin.file:
            path: "{{ keycloak_values_file.path }}"
            state: absent
          when: keycloak_values_file.path is defined

        - name: Remove temporary chart directory
          ansible.builtin.file:
            path: "{{ keycloak_chart_dir.path }}"
            state: absent
          when: keycloak_chart_dir.path is defined
